[tool:pytest]
addopts = --cov=sense_emu --cov-report=term-missing --tb=short --cov-fail-under=85
testpaths = tests
env =
    QT_QPA_PLATFORM=offscreen

[coverage:run]
source = sense_emu
branch = true
concurrency = thread

[coverage:report]
ignore_errors = true
show_missing = true
exclude_lines =
    assert False
    raise NotImplementedError
    pass
    if sys.version_info[:2] == (3, 2)
