name: Python 3.13 & 3.14 Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily to catch compatibility issues
    - cron: '0 2 * * *'

jobs:
  test-py313-py314:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Display Python version
      run: |
        python -c "import sys; print(f'Python {sys.version}')"
        python -m pip --version

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libxkbcommon-x11-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[gui,test]"

    - name: Run tests with pytest
      run: |
        pytest \
          --cov=sense_emu \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=85 \
          -v \
          --tb=short

    - name: Generate coverage badge
      if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
      run: |
        pip install coverage-badge
        coverage-badge -o coverage.svg -f

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: py${{ matrix.python-version }}-${{ matrix.os }}
        name: py${{ matrix.python-version }}-${{ matrix.os }}
        fail_ci_if_error: false

    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-py${{ matrix.python-version }}-${{ matrix.os }}
        path: |
          htmlcov/
          coverage.xml
          coverage.svg

  test-with-warnings:
    name: Test with all warnings as errors
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[gui,test]"

    - name: Run tests with warnings as errors
      run: |
        pytest \
          -W error::DeprecationWarning \
          -W error::PendingDeprecationWarning \
          -v \
          --tb=short

  security-check:
    name: Security checks
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit (security issues)
      run: |
        bandit -r sense_emu/ -ll || true

    - name: Check known vulnerabilities
      run: |
        pip install -e ".[gui,test]"
        safety check --json || true

  performance:
    name: Performance check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[gui,test]"
        pip install pytest-benchmark

    - name: Run performance tests
      run: |
        pytest tests/ -v --tb=short
      continue-on-error: true
