name: Python 3.14

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-python-314:
    name: Python 3.14 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Display Python version
      run: |
        python -c "import sys; print(f'Python {sys.version}')"
        python -m pip --version

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libxkbcommon-x11-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[gui,test]"

    - name: Run tests with pytest
      run: |
        pytest \
          --cov=sense_emu \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-fail-under=85 \
          -v \
          --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: python314-${{ matrix.os }}
        name: python314-${{ matrix.os }}
        fail_ci_if_error: false

  security-check-314:
    name: Security Check - Python 3.14
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        pip install -e ".[gui,test]"

    - name: Run Bandit (security issues)
      run: |
        bandit -r sense_emu/ -ll || true

    - name: Check known vulnerabilities
      run: |
        safety check --json || true

  type-check-314:
    name: Type Check - Python 3.14
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy types-setuptools
        pip install -e .

    - name: Run mypy
      run: |
        mypy sense_emu --ignore-missing-imports --no-error-summary || true
